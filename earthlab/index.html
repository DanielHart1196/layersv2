<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earthlab</title>
    <style>
      :root {
        color-scheme: dark;
        --earthlab-bg-top: #041019;
        --earthlab-bg-bottom: #07141b;
        --earthlab-panel-bg: rgba(9, 20, 29, 0.84);
        --earthlab-panel-border: rgba(255, 255, 255, 0.14);
        --earthlab-text: #edf6fb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(68, 118, 145, 0.24), transparent 26%),
          linear-gradient(180deg, var(--earthlab-bg-top), var(--earthlab-bg-bottom));
        color: var(--earthlab-text);
      }

      body {
        min-height: 100dvh;
      }

      .earthlab-app {
        position: relative;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
      }

      .earthlab-map {
        position: absolute;
        inset: 0;
      }

      .earthlab-panel,
      .earthlab-reload {
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        transform: translateY(8px);
      }

      body[data-earthlab-stage="ready"] .earthlab-panel,
      body[data-earthlab-stage="ready"] .earthlab-reload {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .earthlab-status {
        margin: 0;
        color: rgba(237, 246, 251, 0.72);
        white-space: pre-line;
      }
    </style>
  </head>
  <body data-earthlab-stage="boot">
    <main class="earthlab-app" id="app">
      <div class="earthlab-map" id="map"></div>

      <section class="earthlab-panel" aria-label="Earth controls">
        <div class="earthlab-panel-header">
          <div class="earthlab-panel-bar">
            <p class="earthlab-kicker">Earthlab</p>
            <div class="earthlab-panel-actions" aria-label="Earthlab view actions">
              <button class="earthlab-panel-action" type="button" aria-label="Globe view">🌐</button>
              <button class="earthlab-panel-action" type="button" aria-label="Square view">□</button>
              <button class="earthlab-panel-action" type="button" aria-label="Circle view">○</button>
              <button class="earthlab-panel-action" type="button" aria-label="Close">x</button>
            </div>
          </div>
        </div>

        <div class="earthlab-layer-stack">
          <div class="earthlab-rows" id="earthRows">
            <article class="earthlab-row earthlab-row-parent" data-row-id="land" data-reorder-id="land" data-reorder-scope="top">
              <button class="earthlab-row-swatch" id="landSwatch" type="button" aria-label="Set land colors"></button>
              <button class="earthlab-row-toggle" id="landToggle" type="button" role="checkbox" aria-checked="true">
                Land
              </button>
              <span class="earthlab-row-slot" aria-hidden="true"></span>
              <div class="earthlab-row-children" id="landChildren" hidden>
                <article class="earthlab-row earthlab-row-child" data-row-id="landFill" data-layer-id="land.fill" data-reorder-id="land.fill" data-reorder-scope="land">
                  <button class="earthlab-row-swatch" id="landFillSwatch" type="button" aria-label="Set land fill colors"></button>
                  <button class="earthlab-row-toggle" id="landFillToggle" type="button" role="checkbox" aria-checked="true">
                    Fill
                  </button>
                  <span class="earthlab-row-slot" aria-hidden="true"></span>
                  <div class="earthlab-row-style" id="landFillStyle" hidden>
                    <div class="earthlab-style-control">
                      <label class="earthlab-row-style-label" for="landFillColorPicker">Fill color</label>
                      <input class="earthlab-color-picker" type="color" id="landFillColorPicker" value="#6eaa6e" />
                    </div>
                    <div class="earthlab-style-control">
                      <label class="earthlab-row-style-label" for="landFillOpacitySlider">Fill opacity</label>
                      <input class="earthlab-range" type="range" id="landFillOpacitySlider" min="0" max="100" step="1" value="100" />
                    </div>
                  </div>
                </article>
                <article class="earthlab-row earthlab-row-child" data-row-id="landLine" data-layer-id="land.line" data-reorder-id="land.line" data-reorder-scope="land">
                  <button class="earthlab-row-swatch" id="landLineSwatch" type="button" aria-label="Set land outline colors"></button>
                  <button class="earthlab-row-toggle" id="landLineToggle" type="button" role="checkbox" aria-checked="true">
                    Line
                  </button>
                  <span class="earthlab-row-slot" aria-hidden="true"></span>
                  <div class="earthlab-row-style" id="landLineStyle" hidden>
                    <div class="earthlab-style-control">
                      <label class="earthlab-row-style-label" for="landLineColorPicker">Outline color</label>
                      <input class="earthlab-color-picker" type="color" id="landLineColorPicker" value="#d9e4da" />
                    </div>
                    <div class="earthlab-style-control">
                      <label class="earthlab-row-style-label" for="landLineOpacitySlider">Outline opacity</label>
                      <input class="earthlab-range" type="range" id="landLineOpacitySlider" min="0" max="100" step="1" value="100" />
                    </div>
                    <div class="earthlab-style-control">
                      <label class="earthlab-row-style-label" for="landLineWidthSlider">Outline width</label>
                      <input class="earthlab-range" type="range" id="landLineWidthSlider" min="0" max="10" step="0.1" value="1" />
                    </div>
                  </div>
                </article>
              </div>
            </article>
            <article class="earthlab-row" data-row-id="graticules" data-reorder-id="graticules" data-reorder-scope="top">
              <button class="earthlab-row-swatch" id="graticulesSwatch" type="button" aria-label="Set graticules color"></button>
              <button class="earthlab-row-toggle" id="graticulesToggle" type="button" role="checkbox" aria-checked="true">
                Graticules
              </button>
              <span class="earthlab-row-slot" aria-hidden="true"></span>
              <div class="earthlab-row-style" id="graticulesStyle" hidden>
                <div class="earthlab-style-control">
                  <label class="earthlab-row-style-label" for="graticulesColorPicker">Graticules color</label>
                  <input class="earthlab-color-picker" type="color" id="graticulesColorPicker" value="#8fa9bc" />
                </div>
                <div class="earthlab-style-control">
                  <label class="earthlab-row-style-label" for="graticulesOpacitySlider">Graticules opacity</label>
                  <input class="earthlab-range" type="range" id="graticulesOpacitySlider" min="0" max="100" step="1" value="100" />
                </div>
                <div class="earthlab-style-control">
                  <label class="earthlab-row-style-label" for="graticulesWidthSlider">Graticules width</label>
                  <input class="earthlab-range" type="range" id="graticulesWidthSlider" min="0" max="10" step="0.1" value="1" />
                </div>
              </div>
            </article>
            <article class="earthlab-row" data-row-id="ocean" data-reorder-id="ocean" data-reorder-scope="top">
              <button class="earthlab-row-swatch" id="oceanSwatch" type="button" aria-label="Set ocean color"></button>
              <button class="earthlab-row-toggle" id="oceanToggle" type="button" role="checkbox" aria-checked="true">
                Ocean
              </button>
              <span class="earthlab-row-slot" aria-hidden="true"></span>
              <div class="earthlab-row-style" id="oceanStyle" hidden>
                <div class="earthlab-style-control">
                  <label class="earthlab-row-style-label" for="oceanColorPicker">Ocean color</label>
                  <input class="earthlab-color-picker" type="color" id="oceanColorPicker" value="#2c6f92" />
                </div>
                <div class="earthlab-style-control">
                  <label class="earthlab-row-style-label" for="oceanOpacitySlider">Ocean opacity</label>
                  <input class="earthlab-range" type="range" id="oceanOpacitySlider" min="0" max="100" step="1" value="100" />
                </div>
              </div>
            </article>
          </div>

          <button class="earthlab-add-layer" id="addLayerBtn" type="button">
            Add layer
          </button>
        </div>

      </section>
      <button class="earthlab-reload" id="reloadBtn" type="button" title="Reload" aria-label="Reload page"></button>
      <menu class="earthlab-reload-menu" id="reloadMenu" hidden>
        <li><button type="button" id="hardReloadBtn">Hard reload</button></li>
        <li><button type="button" id="clearReloadBtn">Clear cache &amp; reload</button></li>
      </menu>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
